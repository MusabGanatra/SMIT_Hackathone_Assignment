<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MaintainIQ - Assets</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<div class="topbar">
  <div class="brand">MaintainIQ</div>
  <nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="assets.html">Assets</a>
    <a href="maintenance.html">Maintenance</a>
    <a href="history.html">History</a>
    <a href="#" onclick="logout(); return false;">Logout</a>
  </nav>
</div>

<div class="container">

<div class="page-header">
<h1>Assets Management</h1>
<p class="subtitle">Register new assets and keep track of every item in the field.</p>
</div>

<div class="form-box">

<h2>Add New Asset</h2>

<input
type="text"
id="assetName"
placeholder="Asset Name"
>

<input
type="text"
id="category"
placeholder="Category"
>

<input
type="text"
id="location"
placeholder="Location"
>

<select id="condition">

<option>Good</option>
<option>Fair</option>
<option>Poor</option>

</select>

<button
class="btn"
onclick="addAsset()"
>
Add Asset
</button>

</div>

<input
type="text"
id="searchBox"
placeholder="Search by name, code, category or location"
onkeyup="searchAsset()"
>

<br><br>

<table>

<thead>

<tr>
<th>Code</th>
<th>Name</th>
<th>Category</th>
<th>Location</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="assetTable"></tbody>

</table>

</div>

<script src="js/supabase.js"></script>
<script src="js/assets.js"></script>

</body>
</html>
