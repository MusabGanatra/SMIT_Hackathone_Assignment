<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaintainIQ - Login</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<div class="container">

    <div class="login-box">

        <h1>MaintainIQ</h1>

        <p style="text-align:center;margin-bottom:20px;">
            Smart Asset Maintenance System
        </p>

        <div class="input-group">
            <label>Email</label>
            <input
                type="email"
                id="email"
                placeholder="Enter Email"
            >
        </div>

        <div class="input-group">
            <label>Password</label>
            <input
                type="password"
                id="password"
                placeholder="Enter Password"
            >
        </div>

        <button
            class="btn"
            id="loginBtn"
            style="width:100%;"
        >
            Login
        </button>

        <br><br>

        <button
            class="btn secondary"
            id="registerBtn"
            style="width:100%;"
        >
            Register
        </button>

        <p
            class="message"
            id="message"
        ></p>

    </div>

</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
