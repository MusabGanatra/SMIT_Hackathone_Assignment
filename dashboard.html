<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MaintainIQ - Dashboard</title>

<link rel="stylesheet" href="CSS/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<div class="topbar">
  <div class="brand">MaintainIQ</div>
  <nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="assets.html">Assets</a>
    <a href="maintenance.html">Maintenance</a>
    <a href="history.html">History</a>
    <a href="#" onclick="logout(); return false;">Logout</a>
  </nav>
</div>

<div class="dashboard">

<div class="page-header">
<h1>Dashboard</h1>
<p class="subtitle">A quick overview of every asset, issue, and maintenance record.</p>
</div>

<div class="cards">

<div class="card">
<h2 id="assetCount">0</h2>
<p>Total Assets</p>
</div>

<div class="card">
<h2 id="issueCount">0</h2>
<p>Open Issues</p>
</div>

<div class="card">
<h2 id="resolvedCount">0</h2>
<p>Resolved Issues</p>
</div>

<div class="card">
<h2 id="maintenanceCount">0</h2>
<p>Maintenance Records</p>
</div>

</div>

</div>

<script src="JS/dashboard.js"></script>
