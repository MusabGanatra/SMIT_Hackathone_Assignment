<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MaintainIQ - Report Issue</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<div class="topbar">
  <div class="brand">MaintainIQ</div>
</div>

<div class="container">

<div class="page-header">
<h1>Report Asset Issue</h1>
<p class="subtitle">Describe what's wrong and the maintenance team will take it from here.</p>
</div>

<div class="form-box">

<label>Issue Title</label>
<input
type="text"
id="title"
placeholder="e.g. Loud noise when running"
>

<label>Description</label>
<textarea
id="description"
placeholder="Any extra details that would help"
rows="5"
></textarea>

<label>Priority</label>
<select id="priority">

<option value="Low">Low</option>

<option value="Medium" selected>Medium</option>

<option value="High">High</option>

<option value="Critical">Critical</option>

</select>

<button
class="btn"
onclick="submitIssue()"
>
Submit Issue
</button>

</div>

</div>

<script src="js/supabase.js"></script>
<script src="js/issues.js"></script>

</body>
</html>
